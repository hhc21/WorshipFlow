name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: ${{ vars.COVERAGE_MIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov (best effort)
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov || true

      - name: Coverage gate
        run: |
          chmod +x scripts/ci/check_coverage.sh
          scripts/ci/check_coverage.sh

      - name: Build web release
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

